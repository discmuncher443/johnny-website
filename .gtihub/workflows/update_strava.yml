name: Update Strava Data

on:
  schedule:
    - cron: '0 */6 * * *' # Runs automatically every 6 hours
  workflow_dispatch: # Adds a button to let you run it manually from GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the action to commit the JSON file back to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Node 18 has built-in fetch() support

      - name: Fetch Strava Data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: node fetch_strava.js

      - name: Commit and Push activities.json
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add activities.json
          # This checks if there are any changes to commit, preventing errors if you haven't run recently
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Strava data automatically"
          git push